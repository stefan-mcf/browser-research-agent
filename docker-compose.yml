services:
  browser-research-agent:
    build: .
    image: browser-research-agent:local
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      BROWSER_RESEARCH_AGENT_NO_SANDBOX: "1"
    shm_size: "2gb"
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
